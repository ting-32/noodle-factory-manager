
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noodle Factory Manager</title>
    <!-- 引入 pwa 的 manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- 專為 iOS (Safari) 的設定，允許隱藏網址列 -->
    <meta name="apple-mobile-web-app-capable" content="yes">

    <!-- 控制 iOS 畫面上方時間與電量那條狀態列的風格 (可選 default, black, black-translucent) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <!-- iOS 的 App Icon 對應來源 -->
    <link rel="apple-touch-icon" href="/icon-192.png">

    <!-- Android Chrome 導覽列的背景色 -->
    <meta name="theme-color" content="#ffffff" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        morandi: {
                            oatmeal: '#F2F0E9', // bg-main: 燕麥暖灰
                            paper: '#FFFFFF',   // card-surface: 純白
                            charcoal: '#3E3C3A', // text-main: 焦炭深灰 (高對比度)
                            pebble: '#8C8984',   // text-sub: 暖鵝卵石灰
                            
                            // Primary Colors
                            blue: '#5D7586',    // primary: 霧霾藍 (按鈕/重點) WCAG AA Pass
                            pink: '#C79F98',    // secondary: 煙粉色 (裝飾/次要)
                            
                            // Status Colors
                            green: {
                                bg: '#E3ECE6',   // 豆沙綠背景 (極淺)
                                text: '#4A6356'  // 豆沙綠文字 (深色以符合對比)
                            },
                            amber: {
                                bg: '#F9F1E6',
                                text: '#9C7C58'
                            }
                        }
                    },
                    fontFamily: {
                        // System Font Stack optimized for Traditional Chinese & Numbers
                        sans: [
                            'Inter', 
                            '-apple-system', 
                            'BlinkMacSystemFont', 
                            'PingFang TC', // iOS/Mac Traditional Chinese
                            'Noto Sans TC', // Android Traditional Chinese
                            'Microsoft JhengHei', // Windows Traditional Chinese
                            'Helvetica Neue', 
                            'Segoe UI', 
                            'Roboto', 
                            'Arial', 
                            'sans-serif'
                        ],
                    },
                    boxShadow: {
                        'morandi': '0 4px 20px -2px rgba(62, 60, 58, 0.05)',
                        'morandi-lg': '0 10px 25px -5px rgba(62, 60, 58, 0.08)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
            background-color: #F2F0E9; /* morandi-oatmeal */
            color: #3E3C3A; /* morandi-charcoal */
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.625; /* leading-relaxed globally */
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #F2F0E9;
        }
        ::-webkit-scrollbar-thumb {
            background: #C79F98; /* dusty pink thumb */
            border-radius: 10px;
        }
        
        /* Remove default blue highlight on mobile tap */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        /* Print styles */
        @media print {
            @page { margin: 0; }
            body { padding: 1.5cm; } /* ensure the content doesn't hit the physical page edge */

            /* 1. 隱藏不必要列印的 UI 元素 (如導覽列、按鈕、側邊欄、浮動球等) */
            .no-print {
                display: none !important;
            }

            /* 2. 解除所有捲動與高度限制 */
            body, html, #root {
                height: auto !important;
                overflow: visible !important;
            }

            /* 3. 如果你的對帳單包在 Modal 裡面，需要把它解放出來 */
            .modal-container {
                position: static !important;
                height: auto !important;
                overflow: visible !important;
                /* 移除背景變暗的遮罩 */
                background: transparent !important;
            }
        }
    </style>
<script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.39.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "framer-motion": "https://esm.sh/framer-motion@11.18.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4",
    "zustand": "https://esm.sh/zustand@^5.0.11",
    "path": "https://esm.sh/path@^0.12.7",
    "url": "https://esm.sh/url@^0.11.4"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
<script type="module" src="/src/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(error => {
            console.log('Service Worker registration failed:', error);
          });
        });
      }
    </script>
</body>
</html>
